server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve pre-compressed .gz assets produced by the Vite build when present
    gzip_static on;

    # Long-cache fingerprinted assets (js/[name]-[hash].js, images/[name]-[hash].*)
    location ~* \.(?:js|css|woff2?|ttf|otf|eot|png|jpe?g|gif|svg|ico|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback (single-page app, no server-side routes)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Never cache the HTML shell so new deploys are picked up immediately
    location = /index.html {
        add_header Cache-Control "no-cache";
    }
}
